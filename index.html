<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智慧中小学课件下载</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--t:#2d3436;--sub:#636e72;--ac:#6c5ce7;--ach:#5a4bd1;--bd:#dfe6e9}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;justify-content:center;padding:24px 14px 80px}
.app{width:100%;max-width:780px}
h1{text-align:center;font-size:24px}
h1+p{text-align:center;color:var(--sub);font-size:13px;margin:6px 0 20px}
.card{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:20px 22px;margin-bottom:12px}
.ct{font-size:15px;font-weight:600;margin-bottom:10px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:4px}
.fld input{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.fld input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(108,92,231,.1)}
.hint{font-size:11px;color:#999;margin-top:4px;line-height:1.6}
.btn{padding:10px 26px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{background:var(--ach)}
.btn-p:disabled{background:#b2bec3;cursor:not-allowed}
.prog{display:none;margin-top:14px}
.prog.show{display:block}
.bar-bg{background:#eee;border-radius:6px;height:8px}
.bar{background:var(--ac);height:100%;width:0%;border-radius:6px;transition:width .5s}
.prog p{font-size:12px;color:var(--sub);margin-top:6px}
.res-item{padding:10px;border:1px solid var(--bd);border-radius:8px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.res-item .l{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px}
.res-item .r{font-size:12px;color:var(--sub)}
.res-item a{color:var(--ac);text-decoration:none;font-weight:600}
.res-item a:hover{text-decoration:underline}
.cg{margin-bottom:14px}
.cg .gn{font-size:15px;font-weight:700;margin-bottom:6px}
.empty{text-align:center;color:#999;padding:30px}
.ft{text-align:center;margin-top:20px;font-size:11px;color:#bbb}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:4px}.tag.pdf{background:#fde8e8;color:#c0392b}.tag.img{background:#e8f4fd;color:#2980b9}.tag.vid{background:#fef3c7;color:#b45309}
</style>
</head>
<body>
<div class="app">
<h1>📚 智慧中小学课件下载</h1>
<p>粘贴链接 + Token → 自动下载 PDF 和课件图片</p>

<div class="card">
  <div class="fld">
    <label>📎 课件链接</label>
    <input id="u" placeholder="https://basic.smartedu.cn/syncClassroom/classActivity?activityId=...">
  </div>
  <div class="fld">
    <label>🔑 Access Token</label>
    <input id="token" placeholder="粘贴从浏览器 LocalStorage 获取的 Token">
    <div class="hint">
      打开 basic.smartedu.cn 登录 → F12 → Application → Local Storage → 找 ND_UC_AUTH → 复制 value
    </div>
  </div>
  <button class="btn btn-p" id="btn" onclick="go()">🚀 开始下载</button>
  <div class="prog" id="prog">
    <div class="bar-bg"><div class="bar" id="bar"></div></div>
    <p id="progText">准备中...</p>
  </div>
</div>

<div class="card">
  <div class="ct">📁 已下载 <button class="btn" style="float:right;font-size:12px;padding:3px 10px;background:#eeeef4;color:var(--ac)" onclick="ld()">刷新</button></div>
  <div id="list"><div class="empty">加载中...</div></div>
</div>
<div class="ft">课件来源: 国家中小学智慧教育平台 · 仅供个人学习</div>
</div>

<script>
const $=id=>document.getElementById(id);
let busy=false;
const DB='smartedu_v3';

// ====== IndexedDB ======
function openDB(){return new Promise((r,x)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=()=>q.result.createObjectStore('f',{keyPath:'name'});q.onsuccess=()=>r(q.result);q.onerror=x})}
async function save(name,blob){const d=await openDB();const t=d.transaction('f','readwrite');t.objectStore('f').put({name,blob,time:Date.now()});return new Promise(r=>{t.oncomplete=r})}
async function listAll(){const d=await openDB();const t=d.transaction('f','readonly');const q=t.objectStore('f').getAll();return new Promise(r=>{q.onsuccess=()=>r(q.result)})}
async function getOne(name){const d=await openDB();const t=d.transaction('f','readonly');const q=t.objectStore('f').get(name);return new Promise(r=>{q.onsuccess=()=>r(q.result)})}

// ====== View ======
async function ld(){
  const files=await listAll();
  if(!files.length){$('list').innerHTML='<div class="empty">📭 暂无</div>';return}
  const g={};
  for(const f of files){const c=f.name.split('/')[0];if(!g[c])g[c]=[];g[c].push(f)}
  $('list').innerHTML=Object.entries(g).map(([c,fs])=>{
    const pdfs=fs.filter(x=>x.name.endsWith('.pdf'));
    const total=fs.reduce((a,x)=>a+x.blob.size,0);
    const sz=total>1e6?(total/1e6).toFixed(1)+'MB':(total/1024).toFixed(0)+'KB';
    let h=`<div class="cg"><div class="gn">📚 ${c}<span style="font-size:11px;color:var(--sub);font-weight:400;margin-left:8px">${fs.length}文件 · ${sz}</span></div>`;
    pdfs.forEach(x=>{
      const nm=x.name.split('/').pop();
      const s=x.blob.size>1e6?(x.blob.size/1e6).toFixed(1)+'MB':(x.blob.size/1024).toFixed(0)+'KB';
      h+=`<div class="res-item"><span class="l">📄 ${nm}<span class="tag pdf">PDF</span></span><span class="r">${s} <a href="#" onclick="dlFile('${encodeURIComponent(x.name)}');return false">⬇ 下载</a></span></div>`;
    });
    h+='</div>';return h;
  }).join('');
}
async function dlFile(name){
  const f=await getOne(decodeURIComponent(name));
  if(!f)return;
  const u=URL.createObjectURL(f.blob),a=document.createElement('a');a.href=u;a.download=f.name.split('/').pop();
  document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),5000);
}

// ====== Download ======
function setProg(p,t){$('bar').style.width=p+'%';$('progText').textContent=t}

// Call the Vercel API proxy
const API = '/api/download';

async function callApi(body){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return r;
}

async function go(){
  const url=$('u').value.trim(),token=$('token').value.trim();
  if(!url)return alert('请粘贴链接');
  if(busy)return;
  const m=url.match(/activityId=([a-f0-9-]+)/i);
  if(!m)return alert('链接格式错误');
  const activityId=m[1];

  busy=true;$('btn').disabled=true;$('btn').textContent='下载中...';
  $('prog').classList.add('show');setProg(5,'获取课程信息...');

  try{
    // Step 1: get resources
    const {data}=await (await callApi({action:'getResources',activityId})).json();
    const items=data.relations?.national_course_resource||[];
    const title=data.global_title?.['zh-CN']||data.title||'未命名';
    setProg(10,`${title} · ${items.length}个资源`);

    let done=0,total=0;
    const downloads=[];
    for(const item of items){
      const cp=item.custom_properties||{};
      if(item.resource_type_code==='micro_lesson_video'){downloads.push({skip:true,label:'视频'});continue}
      total++;
      const k=Object.keys(cp.preview||{});
      let folder='',ts='';
      if(k.length>0){
        const mf=cp.preview[k[0]].match(/edu_product\/esp\/([^/]+)\//);if(mf)folder=mf[1];
        const mt=cp.preview[k[0]].match(/\/(\d{13})\//);if(mt)ts=mt[1];
      }
      const label=({coursewares:'课件',lesson_plandesign:'教学设计',task_list:'学习任务单',class_exercises:'课后练习'})[folder]||folder;
      downloads.push({folder,ts,id:item.id,label,isCW:folder==='coursewares'});
    }

    // Step 2: process each resource
    for(const dl of downloads){
      if(dl.skip)continue;
      done++;

      if(dl.isCW){
        // Download images via proxy
        setProg(15+Math.round((done/total)*80),`下载课件图片...`);
        let imgs=0,miss=0;
        const pubCDN=['r1-ndr.ykt.cbern.com.cn','r2-ndr.ykt.cbern.com.cn','r3-ndr.ykt.cbern.com.cn'];
        for(let p=1;p<=60;p++){
          if(miss>=3&&p>5)break;
          let ok=false;
          for(const h of pubCDN){
            if(ok)break;
            try{
              const imgUrl=`https://${h}/edu_product/esp/${dl.folder}/${dl.id}.t/zh-CN/${dl.ts}/transcode/image/${p}.jpg`;
              const r=await callApi({action:'downloadImage',url:imgUrl});
              const blob=await r.blob();
              if(blob.size>500){
                await save(`${s(title)}/课件_页面图片/page_${String(p).padStart(3,'0')}.jpg`,blob);
                imgs++;ok=true;miss=0;
              }
            }catch(e){}
          }
          if(!ok)miss++;
        }
        setProg(15+Math.round((done/total)*80),`课件图片: ${imgs} 张`);
      }else if(token){
        // Download PDF via proxy
        setProg(15+Math.round((done/total)*80),`下载 ${dl.label} PDF...`);
        let ok=false;
        const priCDN=['r1-ndr-private.ykt.cbern.com.cn','r2-ndr-private.ykt.cbern.com.cn','r3-ndr-private.ykt.cbern.com.cn'];
        for(const h of priCDN){
          if(ok)break;
          try{
            const pdfUrl=`https://${h}/edu_product/esp/${dl.folder}/${dl.id}.t/zh-CN/${dl.ts}/transcode/pdf.pdf`;
            const r=await callApi({action:'downloadPdf',url:pdfUrl,token});
            const blob=await r.blob();
            if(blob.size>500){
              const fp=`${s(title)}/${s(dl.label)}_${s(title)}.pdf`;
              await save(fp,blob);
              // Trigger browser download
              const u2=URL.createObjectURL(blob),a=document.createElement('a');
              a.href=u2;a.download=`${s(dl.label)}_${s(title)}.pdf`;
              document.body.appendChild(a);a.click();document.body.removeChild(a);
              setTimeout(()=>URL.revokeObjectURL(u2),5000);
              ok=true;
            }
          }catch(e){}
        }
      }else{
        done--;
      }
    }

    setProg(100,'✅ 完成!');
    $('progText').textContent='✅ 完成!';
  }catch(e){
    $('progText').textContent='❌ '+e.message;
    alert('下载出错: '+e.message+'\n\n可能原因:\n1. Token 过期了\n2. 网络问题\n3. 链接无效');
  }

  busy=false;$('btn').disabled=false;$('btn').textContent='🚀 开始下载';ld();
}

function s(t){return(t||'untitled').replace(/[<>:"/\\|?*]/g,'_').replace(/\s+/g,'_').substring(0,60)}

$('u').addEventListener('keydown',e=>{if(e.key==='Enter')$('token').focus()});
$('token').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
ld();
</script>
</body>
</html>
