<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智慧中小学课件下载</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--t:#2d3436;--sub:#636e72;--ac:#6c5ce7;--ach:#5a4bd1;--bd:#dfe6e9;--gn:#00b894}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;justify-content:center;padding:24px 14px 80px}
.app{width:100%;max-width:780px}
h1{text-align:center;font-size:24px}
h1+p{text-align:center;color:var(--sub);font-size:13px;margin:6px 0 20px}
.card{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:20px 22px;margin-bottom:12px}
.ct{font-size:15px;font-weight:600;margin-bottom:10px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:4px}
.fld input{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.fld input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(108,92,231,.1)}
.hint{font-size:11px;color:#999;margin-top:4px;line-height:1.6}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{background:var(--ach)}
.btn-p:disabled{background:#b2bec3;cursor:not-allowed}
.btn-dl{background:var(--gn);color:#fff;padding:6px 14px;font-size:12px;border-radius:6px;text-decoration:none}
.btn-dl:hover{background:#00a381}
.btn-out{background:#fff;color:var(--ac);border:1.5px solid var(--ac);padding:6px 14px;font-size:12px;border-radius:6px}
.btn-out:hover{background:#f5f3ff}
.prog{display:none;margin-top:14px}
.prog.show{display:block}
.bar-bg{background:#eee;border-radius:6px;height:8px}
.bar{background:var(--ac);height:100%;width:0%;border-radius:6px;transition:width .5s}
.prog p{font-size:12px;color:var(--sub);margin-top:6px}
.res-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--bd);border-radius:8px;margin-bottom:5px;gap:10px;flex-wrap:wrap}
.res-item:hover{background:#fafbfc}
.res-item .l{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;min-width:0;flex:1}
.res-item .l .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-item .r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.cg{margin-bottom:14px}
.cg .gn{font-size:15px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.empty{text-align:center;color:#999;padding:30px}
.ft{text-align:center;margin-top:20px;font-size:11px;color:#bbb;line-height:1.8}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;flex-shrink:0}
.tag.pdf{background:#fde8e8;color:#c0392b}
.tag.img{background:#e8f4fd;color:#2980b9}
.badge{background:#f0fdf4;color:#166534;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;animation:in .3s}
@keyframes in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:500px){.app{padding:16px 8px}.res-item .r{width:100%}}
</style>
</head>
<body>
<div class="app">
<h1>📚 智慧中小学课件下载</h1>
<p>粘贴链接 + Token → PDF自动弹出下载 · 图片直连CDN秒下</p>

<div class="card">
  <div class="fld">
    <label>📎 课件链接</label>
    <input id="u" placeholder="https://basic.smartedu.cn/syncClassroom/classActivity?activityId=...">
  </div>
  <div class="fld">
    <label>🔑 Access Token</label>
    <input id="token" placeholder="粘贴 LocalStorage 中的 ND_UC_AUTH token">
    <div class="hint">
      打开 basic.smartedu.cn 登录 → F12 → Application → Local Storage → 找 ND_UC_AUTH...&token → 复制 value
    </div>
  </div>
  <button class="btn btn-p" id="btn" onclick="go()">🚀 开始下载</button>
  <div class="prog" id="prog">
    <div class="bar-bg"><div class="bar" id="bar"></div></div>
    <p id="progText">准备中...</p>
  </div>
</div>

<div class="card">
  <div class="ct">📁 已下载
    <button class="btn-out" onclick="clearAll()" style="margin-left:auto;font-size:11px;padding:4px 10px">清空</button>
  </div>
  <div id="list"><div class="empty">暂无下载记录</div></div>
</div>
<div class="ft">课件来源: 国家中小学智慧教育平台 · 仅供个人学习</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const $=id=>document.getElementById(id);let busy=false;
const DB='smartedu_v5';

// ── IndexedDB ──
function openDB(){return new Promise((r,x)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=()=>q.result.createObjectStore('f',{keyPath:'name'});q.onsuccess=()=>r(q.result);q.onerror=x})}
async function save(n,b){const d=await openDB();const t=d.transaction('f','readwrite');t.objectStore('f').put({name:n,blob:b,time:Date.now()});return new Promise(r=>{t.oncomplete=r})}
async function listAll(){const d=await openDB();const t=d.transaction('f','readonly');const q=t.objectStore('f').getAll();return new Promise(r=>{q.onsuccess=()=>r(q.result)})}
async function getOne(n){const d=await openDB();const t=d.transaction('f','readonly');const q=t.objectStore('f').get(n);return new Promise(r=>{q.onsuccess=()=>r(q.result)})}
async function clearDB(){const d=await openDB();const t=d.transaction('f','readwrite');t.objectStore('f').clear();return new Promise(r=>{t.oncomplete=r})}

// ── 工具 ──
function download(url,name){const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a)}
function saveBlob(b,n){const u=URL.createObjectURL(b);download(u,n);setTimeout(()=>URL.revokeObjectURL(u),3000)}
function S(t){return(t||'untitled').replace(/[<>:"/\\|?*]/g,'_').replace(/\s+/g,'_').substring(0,60)}
function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}
function setProg(p,t){$('bar').style.width=p+'%';$('progText').textContent=t}
const API='/api/download';
async function api(body){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw Error('HTTP '+r.status);return r}

// ── 渲染 ──
async function render(){
  const files=await listAll();
  if(!files.length){$('list').innerHTML='<div class="empty">📭 暂无</div>';return}
  const g={};
  for(const f of files){const c=f.name.split('/')[0];if(!g[c])g[c]=[];g[c].push(f)}
  $('list').innerHTML=Object.entries(g).map(([c,fs])=>{
    const pdfs=fs.filter(x=>x.name.endsWith('.pdf'));
    const imgs=fs.filter(x=>x.name.match(/\.(jpg|png)$/));
    const imgData=JSON.parse(localStorage.getItem('img_'+c)||'{}');
    const total=fs.reduce((a,x)=>a+x.blob.size,0);
    const sz=total>1e6?(total/1e6).toFixed(1)+' MB':(total/1024).toFixed(0)+' KB';
    let h=`<div class="cg"><div class="gn">📚 ${c}<span style="font-size:11px;color:var(--sub);font-weight:400">${pdfs.length}PDF · ${imgs.length}图片 · ${sz}</span></div>`;
    pdfs.forEach(x=>{
      const nm=x.name.split('/').pop();const s=x.blob.size>1e6?(x.blob.size/1e6).toFixed(1)+' MB':(x.blob.size/1024).toFixed(0)+' KB';
      h+=`<div class="res-item"><span class="l"><span style="font-size:20px">📄</span><span class="nm">${nm}</span><span class="tag pdf">PDF</span></span><span class="r"><span style="color:#999;font-size:12px">${s}</span><button class="btn-dl" data-f="${encodeURIComponent(x.name)}">⬇ 下载</button></span></div>`;
    });
    if(imgData.urls&&imgData.urls.length){
      h+=`<div class="res-item"><span class="l"><span style="font-size:20px">🖼️</span><span class="nm">课件图片 × ${imgData.urls.length}</span><span class="tag img">JPG</span></span><span class="r"><button class="btn-out" data-c="${c}">📦 打包ZIP</button> <button class="btn-dl" data-c="${c}" data-d="all" style="font-size:11px">⬇ 全部</button></span></div>`;
    }
    h+='</div>';return h;
  }).join('');

  // 绑定
  $('list').querySelectorAll('.btn-dl[data-f]').forEach(b=>b.onclick=async()=>{
    const f=await getOne(decodeURIComponent(b.dataset.f));
    if(!f)return toast('文件过期');saveBlob(f.blob,f.name.split('/').pop());toast('✅ 已下载');
  });
  $('list').querySelectorAll('.btn-dl[data-d="all"]').forEach(b=>b.onclick=()=>{
    const c=b.dataset.c;const d=JSON.parse(localStorage.getItem('img_'+c)||'{}');
    if(!d.urls)return;
    d.urls.forEach((u,i)=>{setTimeout(()=>download(u,`课件_page_${String(i+1).padStart(3,'0')}.jpg`),i*150)});
    toast(`✅ 下载 ${d.urls.length} 张 (直连CDN)`);
  });
  $('list').querySelectorAll('.btn-out[data-c]').forEach(b=>b.onclick=async()=>{
    const c=b.dataset.c;const d=JSON.parse(localStorage.getItem('img_'+c)||'{}');
    if(!d.urls||!d.urls.length)return toast('无图片');
    toast('📦 打包中...');
    const zip=new JSZip();
    const batch=6;let i=0;
    while(i<d.urls.length){
      const batchUrls=d.urls.slice(i,i+batch);
      const blobs=await Promise.all(batchUrls.map(u=>fetch(u).then(r=>r.blob()).catch(()=>null)));
      blobs.forEach((b,j)=>{if(b)zip.file(`page_${String(i+j+1).padStart(3,'0')}.jpg`,b)});
      i+=batch;
      if(i%12===0)toast(`打包中 ${Math.round(i/d.urls.length*100)}%`);
    }
    const zb=await zip.generateAsync({type:'blob'});
    saveBlob(zb,c.replace(/\//g,'_')+'_课件图片.zip');
    toast('✅ ZIP '+(zb.size/1024/1024).toFixed(1)+'MB');
  });
}

async function clearAll(){if(!confirm('确定清空？'))return;await clearDB();for(const k of Object.keys(localStorage))if(k.startsWith('img_'))localStorage.removeItem(k);render();toast('已清空')}

// ── 下载主流程 ──
async function go(){
  const url=$('u').value.trim(),token=$('token').value.trim();
  if(!url)return alert('请粘贴链接');if(busy)return;
  const m=url.match(/activityId=([a-f0-9-]+)/i);if(!m)return alert('链接格式错误');
  const activityId=m[1];
  busy=true;$('btn').disabled=true;$('btn').textContent='下载中...';
  $('prog').classList.add('show');setProg(5,'获取课程信息...');

  try{
    const {data}=await(await api({action:'getResources',activityId})).json();
    const items=data.relations?.national_course_resource||[];
    const title=data.global_title?.['zh-CN']||data.title||'未命名';
    setProg(10,`${title} · ${items.length}个资源`);

    let pdfOk=0,imgOk=0;
    const priCDN=['r1-ndr-private.ykt.cbern.com.cn','r2-ndr-private.ykt.cbern.com.cn','r3-ndr-private.ykt.cbern.com.cn'];

    for(const item of items){
      const cp=item.custom_properties||{};
      if(item.resource_type_code==='micro_lesson_video')continue;
      const k=Object.keys(cp.preview||{});
      let folder='',ts='';
      if(k.length>0){const mf=cp.preview[k[0]].match(/edu_product\/esp\/([^/]+)\//);if(mf)folder=mf[1];const mt=cp.preview[k[0]].match(/\/(\d{13})\//);if(mt)ts=mt[1];}
      const label=({coursewares:'课件',lesson_plandesign:'教学设计',task_list:'学习任务单',class_exercises:'课后练习'})[folder]||folder;
      const isCW=folder==='coursewares';

      if(isCW){
        // 图片 — 探测有多少页，存 URL 列表（不经过代理！）
        setProg(20,'探测课件页数...');
        const pubCDN=['r1-ndr.ykt.cbern.com.cn','r2-ndr.ykt.cbern.com.cn','r3-ndr.ykt.cbern.com.cn'];
        const urls=[],host=pubCDN[0];
        let miss=0;
        for(let p=1;p<=60;p++){
          if(miss>=3&&p>5)break;
          const imgUrl=`https://${host}/edu_product/esp/${folder}/${item.id}.t/zh-CN/${ts}/transcode/image/${p}.jpg`;
          try{
            const r=await fetch(imgUrl,{method:'HEAD',signal:AbortSignal.timeout(5000)});
            if(r.ok){urls.push(imgUrl);miss=0}else{miss++}
          }catch(e){miss++}
          if(p%10===0)setProg(25,`探测课件页数: ${urls.length} 页...`);
        }
        localStorage.setItem('img_'+S(title),JSON.stringify({urls,ts:Date.now()}));
        imgOk=urls.length;
        setProg(40,`课件: ${imgOk} 页 (可直接下载)`);

        // 下载前3张存DB预览
        for(let i=0;i<Math.min(3,urls.length);i++){
          try{const r=await fetch(urls[i]);if(r.ok)await save(`${S(title)}/课件_页面图片/page_${String(i+1).padStart(3,'0')}.jpg`,await r.blob())}catch(e){}
        }
      }else if(token){
        // PDF — 走代理
        setProg(50+pdfOk*15,`下载 ${label}...`);
        let ok=false;
        for(const h of priCDN){
          if(ok)break;
          try{
            const r=await api({action:'downloadPdf',url:`https://${h}/edu_product/esp/${folder}/${item.id}.t/zh-CN/${ts}/transcode/pdf.pdf`,token});
            const blob=await r.blob();
            if(blob.size>500){
              await save(`${S(title)}/${S(label)}_${S(title)}.pdf`,blob);
              saveBlob(blob,`${S(label)}_${S(title)}.pdf`);
              ok=true;pdfOk++;
            }
          }catch(e){}
        }
      }
    }

    setProg(100,`✅ PDF:${pdfOk} 图片:${imgOk}页`);
    $('progText').textContent=`✅ PDF ${pdfOk}个已下载 · 课件图片 ${imgOk}页 (点打包下载)`;
    if(!token)$('progText').textContent+=' ⚠️ 无Token，PDF未下载';
  }catch(e){$('progText').textContent='❌ '+e.message;toast('出错: '+e.message)}
  busy=false;$('btn').disabled=false;$('btn').textContent='🚀 开始下载';render();
}

$('u').addEventListener('keydown',e=>{if(e.key==='Enter')$('token').focus()});
$('token').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
render();
</script>
</body>
</html>
